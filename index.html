<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SIGAC Scanner</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#07111f">

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    *{box-sizing:border-box;font-family:Arial, Helvetica, sans-serif}

    body{
      margin:0;
      background:#0b111c;
      color:white;
      text-align:center;
    }

    header{
      padding:18px;
      background:#07111f;
      font-size:22px;
      font-weight:bold;
    }

    .box{
      max-width:520px;
      margin:25px auto;
      padding:20px;
    }

    .card{
      background:#111827;
      border-radius:18px;
      padding:20px;
      border:1px solid #263244;
    }

    input,button,select{
      width:100%;
      padding:14px;
      margin:8px 0;
      border-radius:10px;
      border:none;
      font-size:16px;
    }

    input,select{
      background:#0b1220;
      color:white;
      border:1px solid #263244;
    }

    button{
      background:#1565c0;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .danger{
      background:#b91c1c;
    }

    .ok{
      color:#00e676;
    }

    .err{
      color:#ff5252;
    }

    .info{
      color:#ffd54f;
    }

    video{
      width:100%;
      max-height:420px;
      margin-top:18px;
      background:#000;
      border-radius:12px;
      border:1px solid #263244;
      object-fit:cover;
    }

    #msg,
    #loginMsg{
      margin-top:14px;
      font-weight:bold;
      min-height:28px;
    }

    .small{
      color:#9fb0c6;
      font-size:13px;
      margin-top:8px;
    }
  </style>
</head>

<body>

<header>📷 SIGAC Scanner</header>

<div class="box">

  <div id="loginBox" class="card">
    <h2>Login do Operador</h2>

    <input id="usuario" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha" onkeydown="verificarEnter(event)">

    <button onclick="login()">Entrar</button>

    <div id="loginMsg"></div>
  </div>

  <div id="scannerBox" class="card" style="display:none;">
    <h2>Scanner QR Code</h2>

    <div id="operador"></div>

    <select id="listaCameras">
      <option value="">Carregando câmeras...</option>
    </select>

    <video id="video" muted playsinline></video>

    <button onclick="iniciarScanner()">▶ Iniciar Scanner</button>
    <button onclick="pararScanner()">⏹ Parar Scanner</button>
    <button class="danger" onclick="sair()">🚪 Sair</button>

    <div class="small">O QR Code deve conter apenas o ID do militar.</div>

    <div id="msg">Pronto.</div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwJB39R7TWeHcMNkQcYwnV-7JpgjO8pgEcxrsdY1jU0vkJRZFGu5YbLz4GPmIVL-5VC/exec";

let leitor = null;
let scannerAtivo = false;
let bloqueado = false;
let cameras = [];

window.onload = function(){
  leitor = new ZXing.BrowserQRCodeReader();

  const token = localStorage.getItem("sigac_token_externo");

  if(token){
    validarToken(token);
  }
};

function verificarEnter(event){
  if(event.key === "Enter"){
    login();
  }
}

function chamarAPI(params, callback){
  const cb = "sigac_cb_" + Date.now();

  window[cb] = function(res){
    callback(res);
    delete window[cb];
    script.remove();
  };

  params.callback = cb;

  const query = Object.keys(params)
    .map(function(k){
      return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
    })
    .join("&");

  const script = document.createElement("script");
  script.src = API_URL + "?" + query;
  document.body.appendChild(script);
}

function login(){
  const usuario = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if(!usuario || !senha){
    mostrarLogin("Informe usuário e senha.", "err");
    return;
  }

  mostrarLogin("Validando...", "info");

  chamarAPI({
    api:"login",
    usuario:usuario,
    senha:senha
  }, function(res){

    if(!res.sucesso){
      mostrarLogin(res.mensagem || "Acesso negado.", "err");
      return;
    }

    localStorage.setItem("sigac_token_externo", res.token);
    localStorage.setItem("sigac_usuario_externo", JSON.stringify(res.usuario));

    abrirScanner(res.usuario);
  });
}

function validarToken(token){
  chamarAPI({
    api:"validar",
    token:token
  }, function(res){

    if(!res.logado){
      localStorage.clear();
      return;
    }

    abrirScanner(res.usuario);
  });
}

function abrirScanner(usuario){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("scannerBox").style.display = "block";

  document.getElementById("operador").innerHTML =
    "Operador: <b>" + usuario.nome + "</b> | Perfil: " + usuario.perfil;

  carregarCameras();
}

function carregarCameras(){
  mensagem("Carregando câmeras...", "info");

  leitor.listVideoInputDevices()
    .then(function(dispositivos){
      cameras = dispositivos || [];

      const select = document.getElementById("listaCameras");
      select.innerHTML = "";

      if(cameras.length === 0){
        select.innerHTML = "<option value=''>Nenhuma câmera encontrada</option>";
        mensagem("Nenhuma câmera encontrada.", "err");
        return;
      }

      let cameraPreferida = "";

      cameras.forEach(function(cam, index){
        const opt = document.createElement("option");
        opt.value = cam.deviceId;
        opt.text = cam.label || ("Câmera " + (index + 1));
        select.appendChild(opt);

        const label = (cam.label || "").toLowerCase();

        if(
          label.includes("back") ||
          label.includes("rear") ||
          label.includes("environment") ||
          label.includes("traseira")
        ){
          cameraPreferida = cam.deviceId;
        }
      });

      if(cameraPreferida){
        select.value = cameraPreferida;
      }

      mensagem("Câmeras prontas. Clique em Iniciar Scanner.", "ok");
    })
    .catch(function(err){
      mensagem("Erro ao carregar câmeras: " + err, "err");
    });
}

function iniciarScanner(){
  if(scannerAtivo){
    return;
  }

  const cameraId = document.getElementById("listaCameras").value;

  if(!cameraId){
    mensagem("Selecione uma câmera.", "err");
    return;
  }

  mensagem("Iniciando câmera...", "info");

  leitor.decodeFromVideoDevice(
    cameraId,
    "video",
    function(resultado, erro){
      if(resultado){
        processarQR(resultado.getText());
      }
    }
  )
  .then(function(){
    scannerAtivo = true;
    mensagem("Scanner ativo. Aponte para o QR Code.", "ok");
  })
  .catch(function(err){
    mensagem("Erro ao abrir câmera: " + err, "err");
  });
}

function pararScanner(){
  if(!leitor){
    return;
  }

  leitor.reset();
  scannerAtivo = false;
  mensagem("Scanner parado.", "info");
}

function processarQR(texto){
  if(bloqueado){
    return;
  }

  bloqueado = true;

  const id = String(texto).trim();
  const token = localStorage.getItem("sigac_token_externo");

  if(navigator.vibrate){
    navigator.vibrate(120);
  }

  mensagem("Registrando ID " + id + "...", "info");

  chamarAPI({
    api:"registrar",
    id:id,
    token:token
  }, function(res){

    if(!res.sucesso){
      mensagem("❌ " + res.mensagem, "err");
    } else if(res.tipo === "ENTRADA"){
      mensagem("🟢 ENTRADA registrada com sucesso.", "ok");
    } else {
      mensagem("🔴 SAÍDA registrada com sucesso.", "ok");
    }

    setTimeout(function(){
      bloqueado = false;
      mensagem("Pronto para nova leitura.", "info");
    }, 3000);
  });
}

function sair(){
  pararScanner();
  localStorage.clear();
  location.reload();
}

function mostrarLogin(texto, tipo){
  const el = document.getElementById("loginMsg");
  el.className = tipo;
  el.innerHTML = texto;
}

function mensagem(texto, tipo){
  const el = document.getElementById("msg");
  el.className = tipo;
  el.innerHTML = texto;
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
